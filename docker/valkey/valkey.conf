# Valkey Configuration for Excalidraw MCP
# ========================================

# --- Network ---
bind 0.0.0.0
protected-mode yes

# --- TLS ---
# Disable non-TLS port entirely
port 0
tls-port 6379
tls-cert-file /tls/valkey-server.crt
tls-key-file /tls/valkey-server.key
tls-ca-cert-file /tls/ca.crt
tls-auth-clients optional

# --- Authentication & ACL ---
# ACL users are defined in /tmp/users.acl, generated at startup
# by docker/valkey/entrypoint.sh with the password from VALKEY_PASSWORD env var.
# The --aclfile flag is passed via the entrypoint script.

# --- Persistence ---
# RDB snapshots: save every 60s if at least 1 write
save 60 1

# AOF for durability
appendonly yes
appendfsync everysec

# --- Memory ---
maxmemory 128mb
maxmemory-policy noeviction

# --- Logging ---
loglevel notice
