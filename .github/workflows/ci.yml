name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Format check
        run: pnpm run format

      - name: Test with coverage
        run: pnpm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  docker-build-test:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Generate TLS certificates
        run: bash docker/valkey/generate-certs.sh

      - name: Create .env file
        run: printf 'PORT=3000\nVALKEY_PASSWORD=ci-test-password-%s\n' "$(date +%s)" > .env

      - name: Build Docker images
        run: docker compose build

      - name: Start services
        run: docker compose up -d

      - name: Wait for healthchecks
        run: |
          echo "Waiting for services to be healthy..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3000/health >/dev/null 2>&1; then
              echo "App healthy after ${i}s"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "FAIL: Health check timeout"
              docker compose ps
              exit 1
            fi
            sleep 1
          done

      - name: MCP initialize test
        run: |
          RESPONSE=$(curl -sf -X POST http://localhost:3000/mcp \
            -H "Content-Type: application/json" \
            -H "Accept: application/json, text/event-stream" \
            -d '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-03-26","capabilities":{},"clientInfo":{"name":"ci","version":"1.0"}}}')
          echo "$RESPONSE" | grep -q "serverInfo" || { echo "FAIL: $RESPONSE"; exit 1; }
          echo "PASS: MCP initialize"

      - name: tools/list test
        run: |
          RESPONSE=$(curl -sf -X POST http://localhost:3000/mcp \
            -H "Content-Type: application/json" \
            -H "Accept: application/json, text/event-stream" \
            -d '{"jsonrpc":"2.0","id":2,"method":"tools/list","params":{}}')
          echo "$RESPONSE" | grep -q "create_view" || { echo "FAIL: $RESPONSE"; exit 1; }
          echo "PASS: tools/list"

      - name: Stop services
        run: docker compose down -v

      - name: Show logs on failure
        if: failure()
        run: docker compose logs
